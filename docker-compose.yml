services:

  influxdb:
    image: influxdb:2.7
    container_name: voice-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:-changeme123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-discord}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-voice_logs}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION:-90d}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: voice-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - INFLUX_TOKEN=${INFLUX_TOKEN}
    depends_on:
      influxdb:
        condition: service_healthy

  bot:
    build: .
    container_name: voice-bot
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    env_file:
      - .env

volumes:
  influxdb_data:
  grafana_data:
